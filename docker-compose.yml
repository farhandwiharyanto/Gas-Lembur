services:
  # PHP-FPM Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gas-lembur-app
    container_name: gas-lembur-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - ./:/var/www
    networks:
      - gas-lembur-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: gas-lembur-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - gas-lembur-network

  # Vite Service (Node.js)
  vite:
    image: node:20-alpine
    container_name: gas-lembur-vite
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
      - /var/www/node_modules
    command: sh -c "if [ ! -d '/var/www/node_modules/vite' ]; then npm install; fi && npm run dev -- --host"
    networks:
      - gas-lembur-network

  # Database Service (PostgreSQL)
  postgresql:
    image: postgres:16-alpine
    container_name: gas-lembur-db
    restart: unless-stopped
    tty: true
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gas_lembur_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - gas-lembur-db-data:/var/lib/postgresql/data
    networks:
      - gas-lembur-network

  # Adminer (Monitoring)
  adminer:
    image: adminer
    container_name: gas-lembur-adminer
    restart: unless-stopped
    ports:
      - "8082:8080"
    networks:
      - gas-lembur-network

networks:
  gas-lembur-network:
    driver: bridge

volumes:
  gas-lembur-db-data:
    driver: local
